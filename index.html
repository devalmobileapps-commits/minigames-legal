<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamePocket — Legal Documents</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --accent: #8b5cf6;
            --text-on-dark: rgba(255,255,255,0.9);
            --text-muted: rgba(255,255,255,0.4);
            --glass-bg: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
            --glass-hover: rgba(99,102,241,0.18);
            --glass-hover-border: rgba(99,102,241,0.45);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: #0d0b26;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(99,102,241,0.35), transparent 70%);
            top: -200px; left: -200px;
            animation: drift 12s ease-in-out infinite alternate;
        }

        .orb-2 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(139,92,246,0.3), transparent 70%);
            bottom: -150px; right: -150px;
            animation: drift 10s ease-in-out infinite alternate-reverse;
        }

        .orb-3 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(79,70,229,0.2), transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 6s ease-in-out infinite;
        }

        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.15); }
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 56px 48px 48px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.05) inset,
                0 40px 80px rgba(0,0,0,0.5),
                0 0 60px rgba(99,102,241,0.08);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.35);
            color: #a5b4fc;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 50px;
            margin-bottom: 28px;
        }

        .app-icon {
            font-size: 72px;
            line-height: 1;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(0 8px 24px rgba(99,102,241,0.5));
            animation: icon-float 4s ease-in-out infinite;
        }

        @keyframes icon-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            font-size: 2.75rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 40%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.65;
            margin-bottom: 44px;
            max-width: 340px;
            margin-left: auto;
            margin-right: auto;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            text-decoration: none;
            color: var(--text-on-dark);
            transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
            text-align: left;
        }

        .link-card:hover {
            background: var(--glass-hover);
            border-color: var(--glass-hover-border);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(99,102,241,0.18);
        }

        .link-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .link-icon.privacy {
            background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
            box-shadow: 0 4px 16px rgba(99,102,241,0.4);
        }

        .link-icon.terms {
            background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%);
            box-shadow: 0 4px 16px rgba(124,58,237,0.4);
        }

        .link-text {
            flex: 1;
            min-width: 0;
        }

        .link-text h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            margin-bottom: 3px;
        }

        .link-text p {
            font-size: 0.78rem;
            color: var(--text-muted);
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .link-arrow {
            color: rgba(255,255,255,0.25);
            font-size: 20px;
            transition: transform 0.2s ease, color 0.2s ease;
            flex-shrink: 0;
        }

        .link-card:hover .link-arrow {
            transform: translateX(5px);
            color: rgba(165,180,252,0.8);
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            margin: 40px 0 0;
        }

        .footer {
            margin-top: 32px;
            color: rgba(255,255,255,0.18);
            font-size: 0.78rem;
            position: relative;
            z-index: 1;
            text-align: center;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            .card { padding: 40px 24px 36px; }
            h1 { font-size: 2.1rem; }
            .link-text p { display: none; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="card">
        <span class="badge">Legal Center</span>
        <span class="app-icon">🎮</span>
        <h1>GamePocket</h1>
        <p class="subtitle">Review the policies and terms that govern your experience with GamePocket</p>

        <div class="links">
            <a href="privacy-policy.html" class="link-card">
                <div class="link-icon privacy">🔒</div>
                <div class="link-text">
                    <h3>Privacy Policy</h3>
                    <p>How we handle your data — spoiler: we collect none</p>
                </div>
                <span class="link-arrow">›</span>
            </a>
            <a href="terms-of-service.html" class="link-card">
                <div class="link-icon terms">📜</div>
                <div class="link-text">
                    <h3>Terms of Service</h3>
                    <p>Rules and guidelines for using GamePocket</p>
                </div>
                <span class="link-arrow">›</span>
            </a>
        </div>

        <div class="divider"></div>
    </div>

    <p class="footer">
        © 2026 Deval Joshi · Lunethyx Labs · All rights reserved
    </p>
</body>
</html>
